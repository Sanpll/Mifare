basePath: /
definitions:
  dto.AuthorizeTransactionInput:
    properties:
      card_number:
        maxLength: 14
        minLength: 8
        type: string
      price:
        type: number
      terminal_serial_number:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - card_number
    - price
    type: object
  dto.AuthorizeTransactionResponse:
    properties:
      authorized:
        type: boolean
      message:
        type: string
    type: object
  dto.CardResponse:
    properties:
      balance:
        type: number
      id:
        type: integer
      is_blocked:
        type: boolean
      key_value:
        type: string
      number:
        type: string
      owner_name:
        type: string
    type: object
  dto.CardUpdate:
    properties:
      balance:
        type: number
      is_blocked:
        type: boolean
      key_value:
        type: string
      owner_name:
        maxLength: 100
        minLength: 3
        type: string
    type: object
  dto.CardsResponse:
    properties:
      cards:
        items:
          $ref: '#/definitions/dto.CardResponse'
        type: array
    type: object
  dto.CreateCardInput:
    properties:
      balance:
        type: number
      is_blocked:
        type: boolean
      key_value:
        type: string
      number:
        maxLength: 14
        minLength: 8
        type: string
    required:
    - balance
    - key_value
    - number
    type: object
  dto.CreateKeyInput:
    properties:
      description:
        maxLength: 200
        minLength: 5
        type: string
      type:
        enum:
        - A
        - B
        type: string
      value:
        type: string
    required:
    - description
    - type
    - value
    type: object
  dto.CreateTerminalInput:
    properties:
      address:
        maxLength: 200
        minLength: 5
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      serial_number:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - address
    - name
    - serial_number
    type: object
  dto.CreateTransactionInput:
    properties:
      card_number:
        maxLength: 14
        minLength: 8
        type: string
      price:
        type: number
      status:
        minLength: 2
        type: string
      terminal_serial_number:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - card_number
    - price
    - terminal_serial_number
    type: object
  dto.KeyResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  dto.KeyUpdate:
    properties:
      description:
        maxLength: 200
        minLength: 5
        type: string
      type:
        enum:
        - A
        - B
        type: string
      value:
        type: string
    type: object
  dto.KeysResponse:
    properties:
      keys:
        items:
          $ref: '#/definitions/dto.KeyResponse'
        type: array
    type: object
  dto.SignInInput:
    properties:
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.SignUpInput:
    properties:
      is_admin:
        type: boolean
      password:
        minLength: 6
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.TerminalResponse:
    properties:
      address:
        type: string
      id:
        type: integer
      name:
        type: string
      serial_number:
        type: string
    type: object
  dto.TerminalUpdate:
    properties:
      address:
        maxLength: 200
        minLength: 5
        type: string
      name:
        maxLength: 100
        minLength: 3
        type: string
      serial_number:
        maxLength: 50
        minLength: 3
        type: string
    type: object
  dto.TerminalsResponse:
    properties:
      terminals:
        items:
          $ref: '#/definitions/dto.TerminalResponse'
        type: array
    type: object
  dto.TransactionResponse:
    properties:
      card_number:
        type: string
      id:
        type: integer
      price:
        type: number
      terminal_serial_number:
        type: string
    type: object
  dto.TransactionUpdate:
    properties:
      card_number:
        maxLength: 14
        minLength: 8
        type: string
      status:
        minLength: 2
        type: string
      terminal_serial_number:
        maxLength: 50
        minLength: 3
        type: string
    type: object
  dto.TransactionsResponse:
    properties:
      transactions:
        items:
          $ref: '#/definitions/dto.TransactionResponse'
        type: array
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      username:
        type: string
    type: object
  dto.UserUpdate:
    properties:
      username:
        type: string
    type: object
  dto.UsersResponse:
    properties:
      users:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  handler.errorResponse:
    properties:
      message:
        type: string
    type: object
  handler.statusResponse:
    properties:
      status:
        type: string
    type: object
